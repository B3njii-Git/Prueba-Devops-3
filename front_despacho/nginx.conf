server {
    listen 80;
    server_name localhost;

    # 1. Sirve los archivos del Frontend (React/Vite)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html; 
    }

    # 2. Rutea al Backend de DESPACHOS
    location /backend-despachos/ {
        # Al estar en la misma Task Definition (Fargate awsvpc), se conectan por localhost
        proxy_pass http://localhost:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Rutea al Backend de VENTAS
    location /backend-ventas/ {
        # Al estar en la misma Task Definition (Fargate awsvpc), se conectan por localhost
        proxy_pass http://localhost:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
